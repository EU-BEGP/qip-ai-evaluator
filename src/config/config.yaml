document_processing:
  text_splitter:
    chunk_size: 500
    chunk_overlap: 50
    max_chunks: null
    separators:
      - "\n\n"
      - "\n"
      - ". "
      - "! "
      - "? "
      - " "
      - ""
    token_encoding: "cl100k_base"

  embeddings:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    use_gpu: true
    hf_token: "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"

vector_store:
  path: "data/vector_store"

retrieval:
  search_type: "mmr"
  search_kwargs:
    k: 5

llm_settings:
  chat_llm:
    model: "qwen:4b"
    temperature: 0.7
    context_size: 4096
    threads: 8
    timeout: 120
    
  processing_llm:
    model: "qwen:4b"
    temperature: 0.2
    context_size: 4096
    top_p: 0.9

debug_mode: false
