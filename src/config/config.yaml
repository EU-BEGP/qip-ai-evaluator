document_processing:
  text_splitter:
    chunk_size: 400
    chunk_overlap: 0
    max_chunks: null
    separators:
      - "\n\n"
      - "\n"
      - ". "
      - "! "
      - "? "
      - " "
      - ""
    token_encoding: "cl100k_base"

  embeddings:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    use_gpu: true
    hf_token: "${HF_TOKEN}"

vector_store:
  path: "data/vector_store"

llm_settings:
   wrapper: "gemini"
   api_key: "${GEMINI_API_KEY}"
   processing_llm:
     model: "gemini-2.5-flash"
     temperature: 0.0
     top_p: 0.1

debug_mode: false

database:
  path: "db/evaluation_history.db"

evaluation:
  scans_path: "data/scans/scans.json"
  evaluation_json_path: "data/evaluation/evaluation_results.json"
  evaluation_report_path: "data/evaluation/evaluation_report.pdf"
  learnify_markdown_path: "data/learnify_modules"
  
memory:
  enabled: true
  head_chars: 4000
  tail_chars: 1500 

knowledge:
  kb_dir: "KB"
  criteria_file: "criteria_files/FinalCriteria.docx"
