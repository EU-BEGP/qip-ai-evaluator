document_processing:
  text_splitter:
    chunk_size: 200
    chunk_overlap: 0
    max_chunks: null
    separators:
      - "\n\n"
      - "\n"
      - ". "
      - "! "
      - "? "
      - " "
      - ""
    token_encoding: "cl100k_base"

  embeddings:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    use_gpu: true
    hf_token: "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"

vector_store:
  path: "data/vector_store"

llm_settings:
  chat_llm:
    model: "qwen3:4b"
    temperature: 0.7
    context_size: 8192
    threads: 8
    timeout: 120
    
  processing_llm:
    model: "qwen3:4b"
    temperature: 0.0
    top_p: 1
    context_size: 8192

debug_mode: false

scans_path: "KB/scans.json"
criteria_path: "evaluation/FinalCriteria.docx"

memory:
  enabled: true
  head_chars: 4000
  tail_chars: 1500 