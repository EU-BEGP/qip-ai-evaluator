document_processing:
  text_splitter:
    chunk_size: 400
    chunk_overlap: 0
    max_chunks: null
    separators:
      - "\n\n"
      - "\n"
      - ". "
      - "! "
      - "? "
      - " "
      - ""
    token_encoding: "cl100k_base"

  embeddings:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    use_gpu: true
    hf_token: "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"

vector_store:
  path: "data/vector_store"

llm_settings:    
  processing_llm:
    model: "qwen3:4b"
    temperature: 0.0
    top_p: 1
    context_size: 8192

debug_mode: false

database:
  path: "db/evaluation_history.db"

evaluation:
  scans_path: "data/scans/scans.json"
  evaluation_json_path: "data/evaluation/evaluation_results.json"
  evaluation_report_path: "data/evaluation/evaluation_report.pdf"
  learnify_markdown_path: "data/learnify_modules"
  
memory:
  enabled: true
  head_chars: 4000
  tail_chars: 1500 