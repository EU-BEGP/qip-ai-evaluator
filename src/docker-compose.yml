services:
  # 1. Redis Broker
  broker:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: ${RESTART_POLICY}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. Django RAG API
  app:
    build: .
    ports:
      - "127.0.0.1:8005:8000"
    volumes:
      - vector_store:/app/data/vector_store
      - hf_cache:/app/cache/huggingface
      - logs_data:/app/logs
    env_file: .env
    environment:
      - TOKENIZERS_PARALLELISM=false
      - PYTHONUNBUFFERED=1
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
    depends_on:
      broker:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: ${RESTART_POLICY}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3. Celery Worker
  celery_worker:
    build: .
    command: celery -A app worker --loglevel=info --pool=threads --concurrency=${CELERY_CONCURRENCY:-3}
    volumes:
      - vector_store:/app/data/vector_store
      - hf_cache:/app/cache/huggingface
      - logs_data:/app/logs
    env_file: .env
    environment:
      - TOKENIZERS_PARALLELISM=false
      - PYTHONUNBUFFERED=1
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
    depends_on:
      broker:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: ${RESTART_POLICY}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vector_store:
  hf_cache:
  redis_data:
  logs_data:
