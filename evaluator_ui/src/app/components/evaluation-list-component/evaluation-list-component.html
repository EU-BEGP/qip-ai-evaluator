<div class="mt-2 history-list">
  <ul class="list-group">
    @for(item of evaluationList; track item.id) {
      <li class="list-group-item list-group-item-action evaluation-item" (click)="clickEvaluation(item)">
        <div class="item-container d-flex">
          <div class="me-2 date-description">
            <mat-icon class="icon">calendar_month</mat-icon>
            {{ item.date }}
          </div>
          <div>
            <mat-icon class="icon user-description">person</mat-icon>
            {{ item.user }}
          </div>
        </div>
      </li>
    }
  </ul>
</div>
