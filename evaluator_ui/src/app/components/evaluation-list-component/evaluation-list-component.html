<div class="mt-2 history-list">
  <ul class="list-group">
    <li class="list-group-item list-group-item-action evaluation-item" (click)="onClickSelfAssessment()">
      <div class="item-container d-flex">
        <div>
          <mat-icon class="icon">fact_check</mat-icon>
          @if(moduleData.status === "Self assessment") {
            Continue self-assessment
          } @else {
            View self-assessment
          }
        </div>
      </div>
    </li>
    @if(moduleData.status !== "Self assessment") {
      <li class="list-group-item list-group-item-action evaluation-item" (click)="onClickAIEvaluation()">
        <div class="item-container d-flex">
          <div>
            <mat-icon class="icon">auto_awesome</mat-icon>
            View AI evaluation
          </div>
        </div>
      </li>
      <li class="list-group-item list-group-item-action evaluation-item" (click)="onClickPeerReview()">
        <div class="item-container d-flex">
          <div>
            <mat-icon class="icon">group</mat-icon>
            View peer reviews
          </div>
        </div>
      </li>
      <li class="list-group-item list-group-item-action evaluation-item" (click)="onClickDownload()">
        <div class="item-container d-flex">
          <div>
            <mat-icon class="icon">download</mat-icon>
            Download Quality Badge
          </div>
        </div>
      </li>
    }
  </ul>
</div>
