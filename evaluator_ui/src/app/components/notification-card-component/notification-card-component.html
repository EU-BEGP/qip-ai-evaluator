<div class="notification-item px-4 pb-2 pt-4" [class.unread]="!notification.read" [class.read]="notification.read" (click)="clickNotification()">
  <p class="notification-title">{{ notification.title }}</p>
  <p class="notification-content">{{ notification.content }}</p>
</div>
