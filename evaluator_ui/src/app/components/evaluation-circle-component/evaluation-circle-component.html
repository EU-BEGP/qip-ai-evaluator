<div class="circle-wrapper" [ngClass]="small ? 'small' : ''">
  <div class="circle-title mb-3" *ngIf="title">
    <b>Average Scan: {{ obtained }}/{{ max }}</b>
  </div>

  <ngx-gauge [type]="'semi'"
    [value]="obtained" 
    [min]="0"
    [max]="max"
    [thresholds]="thresholdConfig"
    [duration]="400"
    [size]="small ? 120 : 200"
    [thick]="small ? 8 : 16">
  </ngx-gauge>

  <div class="circle-text" *ngIf="label">
    <b>{{ label }}</b>
  </div>
</div>
