<div
  id="peer-review-modal"
  class="modal-backdrop bg-dark bg-opacity-50 peer-review-modal"
>
  <div class="card p-4 peer-review-modal-content">
    <h5 class="mb-3">Invite Reviewers</h5>
    <button
      mat-icon-button
      class="close-button"
      (click)="closePeerReviewModal()"
      aria-label="Close"
    >
      <mat-icon>close</mat-icon>
    </button>

    <div
      *ngFor="let email of emails; let i = index; trackBy: trackById"
      class="mb-2"
    >
      <div class="invite-row d-flex align-items-center">
        <input
          class="form-control email-input me-2"
          placeholder="Input a reviewer email..."
          aria-label="Invitee email"
          [(ngModel)]="email.value"
        />
        <button
          mat-icon-button
          color="primary"
          aria-label="Add"
          (click)="addEmail(i)"
          class="me-1 square-btn"
        >
          <mat-icon>add</mat-icon>
        </button>
        <button
          mat-icon-button
          color="warn"
          aria-label="Remove"
          (click)="deleteEmail(i)"
          class="square-btn"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>

    <div class="text-end mt-3">
      <button mat-stroked-button (click)="closePeerReviewModal()">
        Cancel
      </button>
      <button
        mat-flat-button
        color="primary"
        class="ms-2"
        (click)="sendInvites()"
        [disabled]="!sendEnabled"
      >
        Invite
      </button>
    </div>
  </div>
</div>
