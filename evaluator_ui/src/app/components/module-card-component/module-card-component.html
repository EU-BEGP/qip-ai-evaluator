<mat-card class="card bg-light px-4 pt-4 pb-2 clickable" (click)="onClickCard()">
  <div class="d-flex justify-content-end mb-0">
    <div class="alert border-0 rounded-1" [ngClass]="getClass()">{{ getText() }}</div>
  </div>

  <p class="card-title w-100"><b class="me-2">Title:</b>{{ data.title }}</p>
  <p><b class="me-2">Link:</b>{{ data.link }}</p>
  <p><b class="me-2">Last Modify:</b>{{ data.last_modify }}</p>
  <p><b class="me-2">Last Evaluation:</b>{{ data.last_evaluation }}</p>
  <p class="mb-0"><b>Last Score:</b> {{ data.last_average ? data.last_average : '-' }}/{{ data.last_max }}
    @if (data.last_average !== null) {
      <app-evaluation-circle-component [obtained]="data.last_average" [max]="data.last_max" [small]="true"></app-evaluation-circle-component>
    } @else {
      <div class="d-flex justify-content-center">
        <img src="evaluation.png" alt="No Score" class="no-score-img">
      </div>
    }
  </p>
</mat-card>
