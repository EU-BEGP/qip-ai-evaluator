<mat-card class="card bg-light px-4 pt-4 clickable" (click)="onClickCard(data.link)">
    <p><b>Title: </b>{{ data.title }}</p>
    <p><b>Link: </b>{{ data.link }}</p>
    <p><b>Last Modify: </b>{{ data.last_modify }}</p>
    <p><b>Last Evaluation: </b>{{ data.last_evaluation }}</p>
    <p><b>Last Average: </b>{{ data.last_average }}/{{ data.last_max }}</p>
</mat-card>
