@if(shouldRender) {
  <div class="d-flex flex-column container card rounded-2 p-0 mb-4">
    <div class="card-header">
      <p class="title-results my-1"><b>Detailed Results</b></p>
    </div>

    <div class="d-flex flex-wrap justify-content-center results-container card-body py-4">
      @for (scan of completedScans; track $index) {
        <app-evaluation-circle-component
          class="space-top"
          [obtained]="scan.scan_average!"
          [max]="scan.scan_max"
          [label]="scan.name"
          [title]="true">
        </app-evaluation-circle-component>
      }
    </div>
  </div>
}
