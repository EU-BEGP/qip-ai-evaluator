<div class="d-flex flex-column align-items-center justify-content-center m-0 p-0">
  <app-alert-component class="text-center space-top alert mb-0 p-0" [message]="message" *ngIf="scanInformation.outdated"></app-alert-component>
  <button class="text-center space-top" mat-raised-button color="primary" [disabled]="disableEvaluateButton" *ngIf="scanInformation.evaluable" (click)="evaluate()">Evaluate</button>
  <button class="text-center space-top" mat-raised-button color="primary" *ngIf="download" (click)="downloadPDF()">Download PDF</button>

  <div class="ai-container" *ngIf="isEvaluating">
    <mat-progress-bar mode="indeterminate" color="accent" class="space-top"></mat-progress-bar>
    <p class="ai-text">Evaluating with AI</p>
  </div>
  
  <app-evaluation-circle-component class="space-top" [obtained]="scanInformation.scan_average" [max]="scanInformation.scan_max" [label]="scanInformation.name" [title]="true" *ngIf="isFinished"></app-evaluation-circle-component>

  <div class="mb-2 mt-4 p-0">
    <div *ngIf="data !== null && !isLoading" class="m-0">
      <app-evaluation-result-component [data]="data"></app-evaluation-result-component>
    </div>
  </div>

  <div class="ai-container mb-5" *ngIf="isEvaluating">
    <p class="ai-text">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </p>
  </div>
</div>
