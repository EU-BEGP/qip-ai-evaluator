<mat-card class="criterion-card card bg-light px-3 pt-3 pb-2 clickable">
  <div class="question mb-2">{{ question }}</div>

  <div class="button-row mb-2">
    <ng-container *ngFor="let b of buttons; let i = index">
      <button
        mat-raised-button
        [color]="b.state ? 'primary' : 'basic'"
        class="me-2"
        (click)="onButtonClick(b, $event)"
        [disabled]="b.disabled"
      >
        {{ b.label }}
      </button>
    </ng-container>
    <button
      *ngIf="hasAI"
      mat-mini-fab
      color="accent"
      class="ai-fab"
      title="AI suggestion"
      (click)="onAiClick($event)"
      [disabled]="aiLoading"
      [class.loading]="aiLoading"
      [attr.aria-busy]="aiLoading"
    >
      <span class="ai-label" *ngIf="!aiLoading">AI</span>
      <span class="ai-label" *ngIf="aiLoading">AI</span>
    </button>
  </div>

  <hr class="divider" />

  <div class="description mt-2">{{ description }}</div>

  <hr class="divider" />

  <div class="notes mt-2" *ngIf="hasNote || peerNote">
    <label for="notes-{{ question }}" class="form-label">Notes:</label>
    <textarea
      id="notes-{{ question }}"
      class="form-control"
      rows="3"
      [value]="peerNote"
      (change)="onNoteFill($event)"
    ></textarea>
  </div>
</mat-card>
