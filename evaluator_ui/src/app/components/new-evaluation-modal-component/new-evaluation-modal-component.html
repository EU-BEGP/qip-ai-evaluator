<div class="modal-backdrop bg-dark bg-opacity-50 evaluation-modal">
  <div class="card p-4 new-eval-content" [class.expanded]="metadata.length > 0">
    <h5 class="mb-3">Verify Metadata</h5>
    <button mat-icon-button class="close-button" (click)="closeNewEvalModal()" aria-label="Close">
      <mat-icon>close</mat-icon>
    </button>
    <form [formGroup]="newEvalForm" (ngSubmit)="evaluateNew()" class="p-0">
      <div class="d-flex align-items-center gap-3">
        <mat-form-field appearance="fill" class="w-100">
          <mat-label>Course Link</mat-label>
          <input matInput formControlName="courseLink" placeholder="https://time.learnify.se/l/show.html#att/OYJPG">

          @if(courseLinkControl.invalid) {
            <mat-error>
              You must enter a course link.
            </mat-error>
          }

        </mat-form-field>
        <button mat-raised-button color="primary" type="button" (click)="verifyMetadata()">Verify</button>
      </div>

      @if(metadata.length > 0) {
        <div class="d-flex gap-4 content-container">
          <div class="metadata-column">
            @for (item of metadata; track $index) {
              <app-metadata-status-component
                [title]="item.title"
                [status]="item.status"
                [description]="item.description"
                class="mb-4">
              </app-metadata-status-component>
            }
          </div>

          @if(safeCourseLink) {
            <div class="iframe-column">
              <iframe
                [src]="safeCourseLink"
                class="course-frame"
                frameborder="0">
              </iframe>
            </div>
          }
        </div>
      }

      <div class="d-flex justify-content-end gap-2 mt-3">
        <button mat-stroked-button (click)="closeNewEvalModal()" type="button">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="!verified">Evaluate</button>
      </div>
    </form>
  </div>
</div>
