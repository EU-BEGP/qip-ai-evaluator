<app-page-title-component [title]="'AI Evaluation'" [icon]="'auto_awesome'"></app-page-title-component>

<mat-tab-group class="mt-0" [selectedIndex]="selectedIndex" (selectedIndexChange)="onTabChange($event)">
  @for (scan of scansList; track $index; let i = $index) {
    <mat-tab>
      <ng-template mat-tab-label>
        {{ getNameShort(scan.name) }}
        @if (scan.status === 'Completed') {
          <mat-icon class="icon-completed ms-1">check</mat-icon>
        }
        @if (isInProgress(scan)) {
          <mat-icon class="material-symbols-outlined icon-evaluation ms-1">emoji_objects</mat-icon>
        }
        @if (!(scan.status === 'Completed' || isInProgress(scan))) {
          <mat-icon class="icon-progress ms-1">close</mat-icon>
        }
      </ng-template>

      <app-search-component
        [scanInformation]="scan"
        [disableEvaluateButton]="disableEvaluateButton"
        [linkModule]="linkModule"
        (startPolling)="startPolling($event)"
        (downloadEvent)="download()"
      />
    </mat-tab>
  }
</mat-tab-group>
