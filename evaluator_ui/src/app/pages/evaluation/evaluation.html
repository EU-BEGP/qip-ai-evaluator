<mat-tab-group class="mx-5 mt-2">
  <mat-tab *ngFor="let scan of scansList; let i = index">
    <ng-template mat-tab-label>
      {{ scan.name + getEmoji(scan.id, scansList, i) }}
    </ng-template>

    <app-search-component 
      [scanInformation]="scan"
      [disableEvaluateButton]="disableEvaluateButton"
      [linkModule]="linkModule"
      (startPooling)="startPooling()"
    />
  </mat-tab>
</mat-tab-group>
