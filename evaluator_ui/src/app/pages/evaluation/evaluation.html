<mat-tab-group class="mt-2" [selectedIndex]="selectedIndex" (selectedIndexChange)="onTabChange($event)">
  <mat-tab *ngFor="let scan of scansList; let i = index">
    <ng-template mat-tab-label>
      {{ getNameShort(scan.name) }}
      <mat-icon *ngIf="scan.status === 'Completed'" class="icon-completed ms-1">
        check
      </mat-icon>
      <mat-icon *ngIf="isInProgress(scan)" class="material-symbols-outlined icon-evaluation ms-1">
        emoji_objects
      </mat-icon>
      <mat-icon *ngIf="!(scan.status === 'Completed' || isInProgress(scan))" class="icon-progress ms-1">
        close
      </mat-icon>
    </ng-template>

    <app-search-component 
      [scanInformation]="scan"
      [linkModule]="linkModule"
      (startPolling)="startPolling($event)"
      *ngIf="scan.name !== 'All Scans'"
    ></app-search-component>

    <app-module-information-component
      [scanInformation]="scan"
      [scanList]="scansList"
      (downloadEvent)="download()"
      *ngIf="scan.name === 'All Scans'"
    ></app-module-information-component>
  </mat-tab>
</mat-tab-group>
