<app-new-evaluation-modal-component *ngIf="showNewEvalModal" (closeModalEvent)="closeNewEvalModal()"></app-new-evaluation-modal-component>

<div class="modules-container space d-flex flex-wrap justify-content-center gap-5">
  <div *ngFor="let module of modules; let i = index" class="position-relative">
    <app-module-card-component [data]="module" (onClick)="onClickCard($event, i)" (onClickEvaluateUpdated)="onClickEvaluateUpdated($event)"></app-module-card-component>
    <app-evaluation-list-component [evaluationList]="evaluationListByIndex[i]" (selectEvaluation)="onSelectEvaluation($event)" *ngIf="openCardIndex === i"></app-evaluation-list-component>
  </div>
</div>
