<app-page-title-component [title]="'Dashboard'" [icon]="'pie_chart'"></app-page-title-component>

<div class="new-eval-button d-flex mx-5 mt-4">
  <button mat-raised-button color="primary" (click)="openNewEvalModal()">+ New Evaluation</button>
</div>

@if (showNewEvalModal) {
  <div class="modal-backdrop bg-dark bg-opacity-50 evaluation-modal">
    <div class="card p-4 evaluation-card">
      <h5 class="mb-3">New Evaluation</h5>
      <form [formGroup]="newEvalForm" (ngSubmit)="evaluateNew()" class="p-0">
        <mat-form-field appearance="fill" class="w-100">
          <mat-label>Course Link</mat-label>
          <input matInput formControlName="courseLink" [readonly]="disableCourseLink" placeholder="https://time.learnify.se/l/show.html#att/OYJPG">
          @if (courseLinkControl.invalid) {
            <mat-error>You must enter a course link.</mat-error>
          }
        </mat-form-field>
        <div class="d-flex justify-content-end gap-2 mt-3">
          <button mat-stroked-button (click)="closeNewEvalModal()">Cancel</button>
          <button mat-raised-button color="primary" type="submit">Evaluate</button>
        </div>
      </form>
    </div>
  </div>
}

<div class="modules-container space d-flex flex-wrap justify-content-center gap-5">
  @for (module of modules; track $index; let i = $index) {
    <div class="position-relative">
      <app-module-card-component [data]="module" (onClick)="onClickCard($event, i)" (onClickEvaluateUpdated)="onClickEvaluateUpdated($event)"></app-module-card-component>
      @if (openCardIndex === i) {
        <app-evaluation-list-component [evaluationList]="evaluationListByIndex[i]" (selectEvaluation)="onSelectEvaluation($event)"></app-evaluation-list-component>
      }
    </div>
  }
</div>
