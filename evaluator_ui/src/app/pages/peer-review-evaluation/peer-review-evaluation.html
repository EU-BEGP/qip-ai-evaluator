<app-page-title-component [title]="'Peer Evaluation'" [icon]="'person'"></app-page-title-component>

<mat-tab-group class="mt-0" [selectedIndex]="selectedIndex" (selectedIndexChange)="onTabChange($event)">
  @for(scan of scansList; let i = $index; track $index) {
    <mat-tab>
      <ng-template mat-tab-label>
        {{ getNameShort(scan.name) }}
        @if(scan.name === 'All Scans') {
          <mat-icon class="material-symbols-outlined icon-detail ms-1">
            description
          </mat-icon>
        } @else {
          <mat-icon class="material-symbols-outlined icon-detail ms-1">
            grading
          </mat-icon>
        }
      </ng-template>

      @if(scan.name !== 'All Scans') {
        <app-search-component
          [reviewId]="reviewId!" 
          [scanInformation]="scan"
          [isAIEvaluation]="false"
        ></app-search-component>  
      }

      @if(scan.name === 'All Scans') {
        <app-module-information-component
          [evaluationId]="evaluationId!"
          [scanInformation]="scan"
          [scanList]="scansList"
          [isAIEvaluation]="false"
        ></app-module-information-component>
      }
    </mat-tab>
  }
</mat-tab-group>
