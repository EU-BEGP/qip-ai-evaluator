<div class="badge-container">
  <h2>{{ moduleName }}</h2>
  <div class="badge-info">
    <img [src]="badge" alt="Badge Image" class="badge-image" />
    <div class="badge-details">
      <p><strong>Teachers:</strong> <span>{{ teachers }}</span></p>
      <p><strong>Rating:</strong> <span>{{ rating }}</span></p>
    </div>
  </div>
</div>
