<app-page-title-component [title]="'Self Assessment'" [icon]="'quiz'"></app-page-title-component>

<div class="self-assessment container">
  <div class="row">
    <!-- Left: scans list -->
    <div class="col-3 sticky-left">
      <div class="list-group">
        <button
          type="button"
          class="list-group-item list-group-item-action"
          *ngFor="let scan of scans; let i = index"
          [class.active]="currentScan && currentScan.id === scan.id"
          [class.locked]="i > maxUnlockedIndex"
          [disabled]="i > maxUnlockedIndex"
          (click)="selectScan(scan, i)"
          title="{{
            i > maxUnlockedIndex
              ? 'Locked until previous scan is completed'
              : ''
          }}"
        >
          {{ scan.name }}
          <mat-icon *ngIf="i > maxUnlockedIndex" class="ms-2 text-muted"
            >lock</mat-icon
          >
        </button>
      </div>
      <div *ngIf="scans.length === 0" class="alert alert-info">
        No scans available.
      </div>
      <div class="mt-3">
        <button class="btn btn-primary w-100" (click)="onResults()">Results</button>
      </div>
      <div class="mt-3">
        <button
          class="btn btn-primary w-100"
          [disabled]="!doneEnabled"
          (click)="onDone()"
        >
          Done
        </button>
      </div>
    </div>

    <!-- Middle: criterion cards -->
    <div class="col-6">
      <ng-container *ngIf="currentScan; else empty">
        <h3 class="mb-3">{{ currentScan.name }}</h3>

        <div *ngIf="criterions.length === 0" class="alert alert-info">
          No criterions available for this scan.
        </div>

        <div *ngFor="let c of criterions" class="d-flex align-items-start mb-3">
          <div class="grow" (click)="selectCriterion(c)">
            <app-criterion-card-component
              [question]="c.question"
              [description]="c.description"
              [buttons]="c.buttons || []"
              (buttonClick)="onCriterionAction($event, c)"
              (aiClick)="onAiSuggestion(c)"
            ></app-criterion-card-component>
          </div>
        </div>
      </ng-container>

      <ng-template #empty>
        <div class="alert alert-secondary">
          Select a scan to view its criterions.
        </div>
      </ng-template>
    </div>

    <!-- Right: AI suggestion panel for selected criterion -->
    <div class="col-3">
      <div *ngIf="selectedCriterion && selectedCriterion.suggestion; else hint">
        <h5 class="mb-2">AI Suggestion</h5>
        <div
          class="suggestion-card p-3"
          [ngClass]="{
            'ai-yes': selectedCriterion.suggestion.badge === 'yes',
            'ai-no': selectedCriterion.suggestion.badge === 'no',
            'ai-na': selectedCriterion.suggestion.badge === 'partial',
          }"
        >
          <div class="fw-bold mb-2 text-capitalize">
            {{ selectedCriterion.suggestion.badge }}
          </div>
          <div class="explanation">
            {{ selectedCriterion.suggestion.result }}
          </div>
        </div>
      </div>

      <ng-template #hint>
        <div class="alert alert-light">
          Select a criterion and request an AI suggestion (click the AI button).
        </div>
      </ng-template>
    </div>
  </div>
</div>
