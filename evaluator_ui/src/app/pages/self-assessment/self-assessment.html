<app-page-title-component
  [title]="'Self Assessment'"
  [icon]="'quiz'"
></app-page-title-component>

@if (isOutdated) {
  <app-alert-component
    type="warning"
    message="You are watching a previous self-assessment as the current module is Outdated."
  ></app-alert-component>
}

<div class="self-assessment container">
  <div class="row">
    <!-- Left: scans list -->
    <div class="col-3 sticky-left">
      <div class="list-group">
        <button
          type="button"
          class="list-group-item list-group-item-action"
          *ngFor="let scan of scans; let i = index"
          [class.active]="currentScan && currentScan.id === scan.id"
          [class.locked]="i > maxUnlockedIndex"
          [disabled]="i > maxUnlockedIndex"
          (click)="selectScan(scan, i)"
          title="{{
            i > maxUnlockedIndex
              ? 'Locked until previous scan is completed'
              : ''
          }}"
        >
          {{ scan.name }}
          <mat-icon *ngIf="i > maxUnlockedIndex" class="ms-2 text-muted"
            >lock</mat-icon
          >
        </button>
      </div>
      <div *ngIf="scans.length === 0" class="alert alert-info">
        No scans available.
      </div>
      <div class="mt-3">
        <button class="btn btn-primary w-100" (click)="onResults()">
          Results
        </button>
      </div>
    </div>

    <!-- Middle: criterion cards -->
    <div class="col-9">
      <ng-container *ngIf="currentScan; else empty">
        <h3 class="mb-3">{{ currentScan.name }}</h3>

        <div *ngIf="criterions.length === 0" class="alert alert-info">
          No criterions available for this scan.
        </div>

        <div *ngFor="let c of criterions" class="d-flex align-items-start mb-3">
          <div class="grow" (click)="selectCriterion(c)">
            <app-criterion-card-component
              [question]="c.question"
              [description]="c.description"
              [buttons]="c.buttons || []"
              (buttonClick)="onCriterionAction($event, c)"
              (aiClick)="onAiSuggestion(c)"
              [hasAI]="true"
              [aiLoading]="aiLoading[c.id] || false"
              [suggestion]="c.suggestion || null"
            ></app-criterion-card-component>
          </div>
        </div>
      </ng-container>

      <ng-template #empty>
        <div class="alert alert-secondary">
          Select a scan to view its criterions.
        </div>
      </ng-template>
    </div>
  </div>
</div>
