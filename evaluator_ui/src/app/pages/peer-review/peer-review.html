<app-page-title-component
  [title]="'Peer Review'"
  [icon]="'quiz'"
></app-page-title-component>

<div class="self-assessment container">
  <div class="row">
    <!-- Left: scans list -->
    <div class="col-3 sticky-left">
      <div class="list-group">
        <button
          type="button"
          class="list-group-item list-group-item-action"
          *ngFor="let scan of scans"
          [class.active]="currentScan && currentScan.id === scan.id"
          (click)="selectScan(scan)"
        >
          {{ scan.name }}
        </button>
      </div>
      <div *ngIf="scans.length === 0" class="alert alert-info mt-3">
        No scans available.
      </div>
      <div class="mt-3">
        <button class="btn btn-primary w-100">Results</button>
      </div>
      <div class="mt-3">
        <button class="btn btn-primary w-100" disabled>Done</button>
      </div>
    </div>

    <!-- Middle: criterion cards -->
    <div class="col-6">
      <ng-container *ngIf="currentScan; else empty">
        <h3 class="mb-3">{{ currentScan.name }}</h3>

        <div *ngIf="criterions.length === 0" class="alert alert-info">
          No criterions available for this scan.
        </div>

        <div *ngFor="let c of criterions" class="d-flex align-items-start mb-3">
          <div class="grow" (click)="selectCriterion(c)">
            <app-criterion-card-component
              [question]="c.question"
              [description]="c.description"
              [buttons]="c.buttons"
              (buttonClick)="onCriterionAction($event, c)"
              (aiClick)="onAiSuggestion(c)"
            ></app-criterion-card-component>
          </div>
        </div>
      </ng-container>

      <ng-template #empty>
        <div class="alert alert-secondary">
          Select a scan to view its criterions.
        </div>
      </ng-template>
    </div>
  </div>
</div>
