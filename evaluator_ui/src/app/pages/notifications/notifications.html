<app-page-title-component [title]="'Notifications'" [icon]="'notifications'"></app-page-title-component>

<div class="notification-container mb-5">  
  @for(notification of notifications; track notification.id) {
    <app-notification-card-component [notification]="notification" (read)="read(notification)"></app-notification-card-component>
  }

</div>

@if(showNotificationModal) {
  <app-notification-modal-component [selectedNotification]="selectedNotification" (close)="closeNotificationModal()" ></app-notification-modal-component>
}
