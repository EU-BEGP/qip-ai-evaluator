<div class="notification-container my-5">
    <h3 class="text-center">Notifications</h3>
    <div class="notification-item px-4 pb-2 pt-4" *ngFor="let notification of notifications" [class.unread]="!notification.read" [class.read]="notification.read" (click)="read(notification)">
        <p class="notification-title">{{ notification.title }}</p>
        <p class="notification-content">{{ notification.content }}</p>
    </div>
</div>

<div *ngIf="showNotificationModal" class="modal-backdrop bg-dark bg-opacity-50 notification-modal">
    <div class="card p-4 notification-card">
        <h5 class="mb-3">{{ selectedNotification!.title }}</h5>
        <p class="mb-3">{{ selectedNotification!.content }}</p>
        <div class="d-flex justify-content-end mt-3">
            <button mat-raised-button color="primary" (click)="goToEvaluation(selectedNotification!.evaluation_id)" class="me-2">Go to evaluation</button>
            <button mat-stroked-button (click)="closeNotificationModal()">Close</button>
        </div>
    </div>
</div>
