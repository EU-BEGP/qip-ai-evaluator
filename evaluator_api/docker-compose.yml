version: '3.8'

services:
  # 1. The PostgreSQL Database
  db:
    image: postgres:15
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: unless-stopped

  # 2. The Redis Broker for Celery
  broker:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 3. The Django App (running Gunicorn)
  app:
    build: .
    ports:
      # Map container 8000 to HOST 8004 (localhost only)
      - "127.0.0.1:8004:8000"
    volumes:
      # Map host static dir to container's static dir
      - /files/eval_api_staticfiles:/app/static
    env_file: .env.prod
    depends_on:
      - db
      - broker
    restart: unless-stopped

  # 4. The Celery Worker
  celery_worker:
    build: .
    # Command to start the worker
    command: celery -A evaluator_api worker -l info
    env_file: .env.prod
    depends_on:
      - db
      - broker
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: